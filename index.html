<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="module" src="./js/index.js" defer></script>
    <title>Bienvenido a The Coffee-Code Engine</title>
  </head>
  <body class="default">
    <div id="navbar-container"></div>
    <!-- Hero section -->
    <section class="hero">
      <!-- Logo y CTA -->
      <div class="hero-content">
        <div class="hero-logo-container">
          <img
            src="./img/logo.jpeg"
            alt="Logo The Coffee-Code Engine"
            class="hero-logo"
          />
        </div>
        <div class="hero-text-container">
          <h1 class="hero-title">The Coffee-Code Engine</h1>
          <p class="hero-subtitle">
            Desarrollo de software con aroma a café tostado.
          </p>
          <div class="hero-actions">
            <a href="#proyectos" class="btn-primary">Ver Proyectos</a>
          </div>
        </div>
      </div>

      <!-- Terminal -->
      <div class="hero-visual">
        <div class="terminal">
          <div class="card-header">
            <p>THE COFFE-CODE ENGINE</p>
            <p class="file-name">./main.js</p>
          </div>
          <div class="terminal-log">
            <p class="hidden-line">
              [SYSTEM] : Iniciando the_coffe-code_engine.sh ...
            </p>
            <p class="hidden-line">[SYSTEM] : Niveles de cafeína al 85 %</p>
            <p class="hidden-line">[SYSTEM] : Listos para compilar</p>
          </div>
          <div class="terminal-accent">
            <p id="typewriter-text"></p>
            <p id="cursor-line">$ > <span class="terminal-cursor">|</span></p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
